<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yihang Liu | Academic Homepage</title>
    <meta
      name="description"
      content="Academic homepage of Yihang Liu, featuring research interests, academic experience, and contact information in 3D vision, GIS, and AI."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
:root {
  --page-bg: #f7f7f5;
  --surface: #ffffff;
  --line: #d7d7d2;
  --line-strong: #b8b8b0;
  --text: #222222;
  --muted: #595959;
  --muted-soft: #767676;
  --accent: #2f5e8b;
  --accent-soft: #edf3f8;
  --shadow: 0 10px 30px rgba(15, 20, 30, 0.06);
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background: var(--page-bg);
  color: var(--text);
  font-family: "Source Sans 3", sans-serif;
  line-height: 1.7;
}

a {
  color: var(--accent);
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

.page-shell {
  width: min(1180px, calc(100% - 32px));
  margin: 0 auto;
  padding: 0 0 48px;
}

.site-header {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  padding: 18px 0 16px;
  border-bottom: 1px solid var(--line);
  background: rgba(247, 247, 245, 0.96);
  backdrop-filter: blur(10px);
}

.brand {
  color: var(--text);
  font-family: "Lora", serif;
  font-size: 1.65rem;
  font-weight: 600;
}

.site-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
}

.site-nav a {
  color: var(--muted);
  font-size: 1rem;
}

.page-layout {
  display: grid;
  grid-template-columns: minmax(250px, 290px) minmax(0, 1fr);
  gap: 56px;
  padding-top: 32px;
}

.profile-sidebar {
  position: sticky;
  top: 92px;
  align-self: start;
}

.profile-card,
.profile-note,
.profile-stats,
.profile-contact,
.about-summary,
.detail-card,
.project-entry,
.timeline-entry,
.contact-list {
  background: var(--surface);
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
}

.profile-card,
.profile-note,
.profile-stats,
.profile-contact {
  margin-bottom: 16px;
}

.profile-card {
  padding: 18px;
}

.profile-media {
  margin-bottom: 18px;
}

.profile-media img {
  display: block;
  width: 100%;
  border: 1px solid var(--line);
}

.profile-caption {
  margin: 10px 0 0;
  color: var(--muted-soft);
  font-size: 0.92rem;
  text-align: center;
}

.profile-name,
.intro-section h2,
.section-heading h2,
.detail-card h3,
.project-entry h3,
.timeline-entry h3,
.profile-note h2 {
  margin: 0;
  font-family: "Lora", serif;
}

.profile-name {
  font-size: 2rem;
  line-height: 1.18;
}

.profile-role {
  margin: 10px 0 0;
  color: var(--muted-soft);
  font-size: 0.94rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.profile-bio {
  margin: 14px 0 0;
  color: var(--muted);
  font-size: 1rem;
}

.profile-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 18px;
}

.button {
  display: block;
  padding: 11px 14px;
  border: 1px solid var(--line-strong);
  font-weight: 600;
  text-align: center;
}

.button.primary {
  color: #ffffff;
  background: var(--accent);
  border-color: var(--accent);
}

.button.secondary {
  color: var(--accent);
  background: var(--accent-soft);
}

.profile-note,
.profile-stats,
.profile-contact {
  padding: 16px 18px;
}

.note-label,
.section-kicker,
.section-label,
.project-tag,
.timeline-period,
.stat-item span {
  color: var(--muted-soft);
  font-size: 0.88rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.profile-note h2 {
  margin-top: 6px;
  font-size: 1.12rem;
  line-height: 1.45;
}

.profile-note p:last-child {
  margin-bottom: 0;
  color: var(--muted);
}

.profile-stats {
  display: grid;
  gap: 12px;
}

.stat-item {
  display: grid;
  gap: 2px;
}

.stat-item strong {
  font-size: 1rem;
  font-weight: 600;
}

.profile-contact {
  display: grid;
  gap: 10px;
}

.contact-item {
  color: var(--muted);
  font-size: 1rem;
}

.content-column {
  min-width: 0;
}

.intro-section {
  padding-bottom: 20px;
  border-bottom: 2px solid var(--line-strong);
}

.intro-section h2 {
  max-width: 15ch;
  margin-top: 8px;
  font-size: clamp(2.35rem, 4vw, 3.6rem);
  line-height: 1.08;
}

.section {
  padding-top: 34px;
}

.section-heading {
  margin-bottom: 16px;
}

.section-heading h2 {
  margin-top: 6px;
  font-size: 2rem;
  line-height: 1.2;
}

.about-summary,
.contact-list {
  padding: 20px 22px;
}

.about-summary p,
.contact-list {
  margin: 0;
}

.about-points,
.project-list,
.timeline {
  display: grid;
  gap: 16px;
  margin-top: 16px;
}

.detail-card,
.project-entry,
.timeline-entry {
  padding: 20px 22px;
}

.detail-card h3,
.project-entry h3,
.timeline-entry h3 {
  font-size: 1.22rem;
  line-height: 1.35;
}

.detail-card p,
.project-entry p,
.timeline-entry p {
  margin: 10px 0 0;
  color: var(--muted);
}

.project-tag {
  margin: 0 0 8px;
}

.project-media {
  margin-top: 16px;
}

.project-media img {
  display: block;
  width: 100%;
  border: 1px solid var(--line);
}

.inline-link {
  display: inline-block;
  margin-top: 12px;
  font-weight: 600;
}

.timeline {
  position: relative;
}

.timeline-entry {
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: 18px;
}

.timeline-period {
  font-weight: 700;
}

.contact-list {
  display: grid;
  gap: 12px;
}

.site-footer {
  padding-top: 28px;
  color: var(--muted-soft);
  font-size: 0.95rem;
}

.reveal {
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 420ms ease, transform 420ms ease;
}

.reveal.is-visible {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 960px) {
  .page-layout {
    grid-template-columns: 1fr;
    gap: 28px;
  }

  .profile-sidebar {
    position: static;
  }

  .intro-section h2 {
    max-width: none;
  }
}

@media (max-width: 640px) {
  .page-shell {
    width: min(100% - 20px, 1180px);
  }

  .site-header {
    position: static;
    flex-direction: column;
    align-items: flex-start;
  }

  .site-nav {
    gap: 14px;
  }

  .timeline-entry {
    grid-template-columns: 1fr;
    gap: 10px;
  }
}

    </style>

          <section class="section reveal" id="journey">

              <p class="section-label" id="journey-eyebrow"></p>
              <h2 id="journey-title"></h2>
            </div>
            <div class="timeline" id="timeline"></div>

          <section class="section reveal" id="contact">
            <div class="section-heading">
              <p class="section-label" id="contact-eyebrow"></p>
              <h2 id="contact-title"></h2>
            </div>
            <div class="contact-list" id="contact-card"></div>
          </section>
        </article>
      </main>

      <footer class="site-footer">
        <p id="footer-text"></p>
      </footer>
    </div>

          "Worked on panoramic depth estimation and point cloud generation for my graduation project, while also contributing to AI product testing and prompt optimization in an internship setting.",
      },
      {
        period: "2025",
        title: "Research on 3D reconstruction quality evaluation",
        text:
          "Published research related to reference-free evaluation of geometric-textural consistency for photogrammetric meshes and received recognition in a national GIS competition paper track.",
      },
      {
        period: "2024",
        title: "Competitions and spatial analysis research",
        text:
          "Led a team to a first prize in a national GIS application competition, published academic work, and participated in research around quantitative evaluation of open urban space.",
      },
    ],
  },
  contact: {
    eyebrow: "Contact",
    title: "I welcome conversations about GIS, 3D vision, academic collaboration, and practical AI applications.",
    items: [
      { label: "giserhang@gmail.com", href: "mailto:giserhang@gmail.com" },
      { label: "@YihangLiu-giser", href: "https://github.com/YihangLiu-giser" },
      { label: "Nanshan District, Shenzhen" },
      { label: "Shenzhen University" },
    ],
  },
  footer: {
    name: "Yihang Liu",
  },
};

    </script>
    <script>
const siteContent = window.SITE_CONTENT;

function setText(id, value) {
  const node = document.getElementById(id);
  if (node) {
    node.textContent = value || "";
  }
}

function createLink({ href, label, className }) {
  const anchor = document.createElement("a");
  anchor.href = href;
  anchor.textContent = label;
  if (className) {
    anchor.className = className;
  }
  return anchor;
}

function createSectionCard(title, text) {
  const article = document.createElement("article");
  const heading = document.createElement("h3");
  const paragraph = document.createElement("p");

  article.className = "detail-card";
  heading.textContent = title;
  paragraph.textContent = text;
  article.append(heading, paragraph);

  return article;
}

function renderNav(items) {
  const nav = document.getElementById("site-nav");
  items.forEach((item) => {
    nav.append(createLink({ href: item.href, label: item.label }));
  });
}

function renderHero(hero, brand) {
  setText("sidebar-name", brand);
  setText("hero-eyebrow", hero.eyebrow);
  setText("hero-title", hero.title);
  setText("hero-text", hero.text);
  setText("hero-card-label", hero.panel.label);
  setText("hero-card-title", hero.panel.title);
  setText("hero-card-text", hero.panel.text);

  const actions = document.getElementById("hero-actions");
  hero.actions.forEach((action) => {
    actions.append(
      createLink({
        href: action.href,
        label: action.label,
        className: `button ${action.variant}`,
      })
    );
  });

  const stats = document.getElementById("hero-stats");
  hero.stats.forEach((item) => {
    const article = document.createElement("article");
    const label = document.createElement("span");
    const value = document.createElement("strong");

    article.className = "stat-item";
    label.textContent = item.label;
    value.textContent = item.value;
    article.append(label, value);
    stats.append(article);
  });

  const media = document.getElementById("hero-media");
  if (!hero.image || !hero.image.src) {
    media.hidden = true;
    return;
  }

  media.hidden = false;
  const img = document.createElement("img");
  img.src = hero.image.src;
  img.alt = hero.image.alt || hero.title;
  media.append(img);

  if (hero.image.caption) {
    const caption = document.createElement("p");
    caption.className = "profile-caption";
    caption.textContent = hero.image.caption;
    media.append(caption);
  }
}

function renderAbout(about) {
  setText("about-eyebrow", about.eyebrow);
  setText("about-title", about.title);
  setText("about-summary", about.summary);

  const container = document.getElementById("about-points");
  about.points.forEach((item) => {
    container.append(createSectionCard(item.title, item.text));
  });
}

function renderProjects(projects) {
  setText("projects-eyebrow", projects.eyebrow);
  setText("projects-title", projects.title);

  const grid = document.getElementById("project-grid");
  projects.items.forEach((item) => {
    const article = document.createElement("article");
    const tag = document.createElement("p");
    const heading = document.createElement("h3");
    const text = document.createElement("p");

    article.className = "project-entry";
    tag.className = "project-tag";
    tag.textContent = item.tag;
    heading.textContent = item.title;
    text.textContent = item.text;
    article.append(tag, heading, text);

    if (item.image && item.image.src) {
      const media = document.createElement("div");
      const img = document.createElement("img");
      media.className = "project-media";
      img.src = item.image.src;
      img.alt = item.image.alt || item.title;
      media.append(img);
      article.append(media);
    }

    if (item.href && item.linkLabel) {
      article.append(
        createLink({
          href: item.href,
          label: item.linkLabel,
          className: "inline-link",
        })
      );
    }

    grid.append(article);
  });
}

function renderJourney(journey) {
  setText("journey-eyebrow", journey.eyebrow);
  setText("journey-title", journey.title);

  const timeline = document.getElementById("timeline");
  journey.items.forEach((item) => {
    const article = document.createElement("article");
    const period = document.createElement("span");
    const content = document.createElement("div");
    const heading = document.createElement("h3");
    const text = document.createElement("p");

    article.className = "timeline-entry";
    period.className = "timeline-period";
    period.textContent = item.period;
    heading.textContent = item.title;
    text.textContent = item.text;
    content.append(heading, text);
    article.append(period, content);
    timeline.append(article);
  });
}

function renderContact(contact) {
  setText("contact-eyebrow", contact.eyebrow);
  setText("contact-title", contact.title);

  const mainContainer = document.getElementById("contact-card");
  const sideContainer = document.getElementById("sidebar-contact");

  contact.items.forEach((item) => {
    const row = document.createElement(item.href ? "a" : "span");
    row.className = "contact-item";
    row.textContent = item.label;

    if (item.href) {
      row.href = item.href;
    }

    const sideRow = row.cloneNode(true);
    mainContainer.append(row);
    sideContainer.append(sideRow);
  });
}

function renderFooter(footer) {
  const currentYear = new Date().getFullYear();
  setText("footer-text", `Copyright ${currentYear} ${footer.name}.`);
}

function renderSite(content) {
  document.title = content.meta.title;
  const description = document.querySelector('meta[name="description"]');
  if (description) {
    description.setAttribute("content", content.meta.description);
  }

  const brandLink = document.getElementById("brand-link");
  brandLink.textContent = content.brand;

  renderNav(content.navigation);
  renderHero(content.hero, content.brand);
  renderAbout(content.about);
  renderProjects(content.projects);
  renderJourney(content.journey);
  renderContact(content.contact);
  renderFooter(content.footer);
}

function initReveal() {
  const revealNodes = document.querySelectorAll(".reveal");
  const revealObserver = new IntersectionObserver(
    (entries) => {
      entries.forEach((entry) => {
        if (!entry.isIntersecting) {
          return;
        }
        entry.target.classList.add("is-visible");
        revealObserver.unobserve(entry.target);
      });
    },
    { threshold: 0.12 }
  );

  revealNodes.forEach((node, index) => {
    node.style.transitionDelay = `${Math.min(index * 50, 180)}ms`;
    revealObserver.observe(node);
  });
}

renderSite(siteContent);
initReveal();

    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yihang Liu | Academic Homepage</title>
    <meta
      name="description"
      content="Academic homepage of Yihang Liu, featuring research interests, academic experience, and contact information in 3D vision, GIS, and AI."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" id="brand-link" href="#top">Yihang Liu</a>
        <nav class="site-nav" id="site-nav" aria-label="Primary"></nav>
      </header>

      <main class="page-layout" id="top">
        <aside class="profile-sidebar reveal">
          <div class="profile-card">
            <div class="profile-media" id="hero-media" hidden></div>
            <h1 class="profile-name" id="sidebar-name"></h1>
            <p class="profile-role" id="hero-eyebrow"></p>
            <p class="profile-bio" id="hero-text"></p>
            <div class="profile-actions" id="hero-actions"></div>
          </div>

          <div class="profile-note">
            <p class="note-label" id="hero-card-label"></p>
            <h2 id="hero-card-title"></h2>
            <p id="hero-card-text"></p>
          </div>

          <div class="profile-stats" id="hero-stats"></div>
          <div class="profile-contact" id="sidebar-contact"></div>
        </aside>

        <article class="content-column">
          <section class="intro-section reveal">
            <p class="section-kicker">Research Profile</p>
            <h2 id="hero-title"></h2>
          </section>

          <section class="section reveal" id="about">
            <div class="section-heading">
              <p class="section-label" id="about-eyebrow"></p>
              <h2 id="about-title"></h2>
            </div>
            <div class="about-summary">
              <p id="about-summary"></p>
            </div>
            <div class="about-points" id="about-points"></div>
          </section>

          <section class="section reveal" id="projects">
            <div class="section-heading">
              <p class="section-label" id="projects-eyebrow"></p>
              <h2 id="projects-title"></h2>
            </div>
            <div class="project-list" id="project-grid"></div>
          </section>

          <section class="section reveal" id="journey">
            <div class="section-heading">
              <p class="section-label" id="journey-eyebrow"></p>
              <h2 id="journey-title"></h2>
            </div>
            <div class="timeline" id="timeline"></div>
          </section>

          <section class="section reveal" id="contact">
            <div class="section-heading">
              <p class="section-label" id="contact-eyebrow"></p>
              <h2 id="contact-title"></h2>
            </div>
            <div class="contact-list" id="contact-card"></div>
          </section>
        </article>
      </main>

      <footer class="site-footer">
        <p id="footer-text"></p>
      </footer>
    </div>

    <script src="./content.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
